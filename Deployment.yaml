apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce
  template:
    metadata:
      labels:
        app: ecommerce
    spec:      
      containers:
      - name: ecommerce
        image: ecommerce-app-app:v1
        imagePullSecrets:
      - name: ecr-secret
        ports:
        - containerPort: 8000
